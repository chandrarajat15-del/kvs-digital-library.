<!DOCTYPE html>
<html>
<head>
    <title>Class {{ class_num }} Resources</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>Class {{ class_num }} Resources</h1>
            <a href="{% url 'home' %}" class="btn btn-outline-secondary">Back</a>
        </div>

        <form method="GET" class="mb-4">
            <div class="input-group">
                <input type="text" name="search" class="form-control" placeholder="Search subject..." value="{{ request.GET.search }}">
                <button class="btn btn-primary" type="submit">Search</button>
            </div>
        </form>

        <div class="row">
            {% for r in resources %}
            <div class="col-md-4 mb-3">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5>{{ r.title }}</h5>
                        <p class="text-muted">{{ r.subject }}</p>
                        <a href="{{ r.pdf_file.url }}" class="btn btn-success w-100" target="_blank">Download PDF</a>
                    </div>
                </div>
            </div>
            {% empty %}
            <p class="text-center">No files found.</p>
            {% endfor %}
        </div>
    </div>
</body>
</html>
